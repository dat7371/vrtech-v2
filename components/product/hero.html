<section class="product-hero">

      <h1 data-product-name></h1>
      <h3 class="product-subtitle" data-product-subtitle></h3>
      <p class="product-desc" data-product-desc></p>
      <div class="hero-actions">
        <a href="#contact" class="btn btn-primary">MUA NGAY</a>
        <a href="#contact" class="btn btn-outline">TƯ VẤN THEO XE</a>
      </div>
    </div>

    <div class="product-hero-media reveal">
      <div class="product-hero-frame">
        <img data-product-hero-image alt="" width="4000" height="4000" fetchpriority="high">
      </div>
    </div>
  </div>
</section>
