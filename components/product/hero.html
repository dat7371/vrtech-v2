<section class="product-hero">
  <div class="container product-hero-layout">
    <div class="product-hero-media reveal">
      <div class="product-hero-main">
        <div class="product-hero-frame">
          <img data-product-hero-image alt="" width="4000" height="4000" fetchpriority="high">
        </div>
      </div>
      <div class="product-hero-thumbs" id="product-hero-thumbs">
      </div>
    </div>

    <div class="product-hero-content reveal">
      <div class="product-summary-card">
        <span class="product-state">Sản phẩm chính hãng • Còn hàng</span>
        <span class="product-badge" data-product-badge></span>
        <h1 data-product-name></h1>
        <h3 class="product-subtitle" data-product-subtitle></h3>
        <p class="product-desc" data-product-desc></p>

        <ul class="product-highlight-list" id="product-highlight-list">
        </ul>

        <div class="product-summary-meta">
          <span>VRTECH Nexus</span>
          <span>Bảo hành điện tử 12 tháng</span>
          <span>Xuất VAT đầy đủ</span>
        </div>

        <div class="hero-actions">
          <a href="#contact" class="btn btn-primary">MUA NGAY</a>
          <a href="#contact" class="btn btn-outline">TƯ VẤN THEO XE</a>
        </div>

        <p class="product-buy-note">Phù hợp xe có Apple CarPlay có dây. Tư vấn theo dòng xe trước khi chốt.</p>
      </div>
    </div>
  </div>
</section>
